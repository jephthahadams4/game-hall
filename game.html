<!DOCTYPE html>
<html>
<head>
<title>Football Game</title>

<style>

body{
    background:#0b6623;
    text-align:center;
    font-family:Arial;
}

h1{
    color:white;
}

#score{
    color:white;
    font-size:30px;
    margin:10px;
}

canvas{
    background:#159447;
    border:5px solid white;
}

button{
    padding:12px 25px;
    font-size:18px;
}

</style>

</head>

<body>


<h1>⚽ Football Battle</h1>

<div id="score">
Red 0 - 0 Yellow
</div>


<canvas id="game" width="900" height="500"></canvas>

<br>

<button onclick="restart()">Restart Game</button>


<script>


const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");


let redScore=0;
let yellowScore=0;


let keys={};


document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
});


document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});




// PLAYERS

let red={
x:200,
y:250,
r:20,
speed:5,
color:"red",
hasBall:true
};


let yellow={
x:700,
y:250,
r:20,
speed:3,
color:"yellow",
hasBall:false
};



let ball={
x:450,
y:250,
r:10
};






function drawField(){

ctx.clearRect(0,0,900,500);


// middle line

ctx.strokeStyle="white";
ctx.lineWidth=3;

ctx.beginPath();

ctx.moveTo(450,0);
ctx.lineTo(450,500);

ctx.stroke();


// goals

ctx.strokeRect(0,170,40,160);

ctx.strokeRect(860,170,40,160);


}







// HUMAN PLAYER DESIGN

function drawPlayer(p){



// head

ctx.fillStyle="#f2c29b";

ctx.beginPath();

ctx.arc(p.x,p.y-35,12,0,Math.PI*2);

ctx.fill();




// body jersey

ctx.fillStyle=p.color;

ctx.fillRect(
p.x-12,
p.y-22,
24,
35
);



// arms

ctx.strokeStyle="#f2c29b";
ctx.lineWidth=6;


ctx.beginPath();

ctx.moveTo(p.x-12,p.y-10);

ctx.lineTo(p.x-25,p.y+5);


ctx.moveTo(p.x+12,p.y-10);

ctx.lineTo(p.x+25,p.y+5);


ctx.stroke();




// legs

ctx.strokeStyle="black";
ctx.lineWidth=7;


ctx.beginPath();

ctx.moveTo(p.x-6,p.y+13);

ctx.lineTo(p.x-10,p.y+35);


ctx.moveTo(p.x+6,p.y+13);

ctx.lineTo(p.x+10,p.y+35);


ctx.stroke();



// shoes

ctx.fillStyle="white";


ctx.fillRect(
p.x-15,
p.y+32,
10,
5
);


ctx.fillRect(
p.x+5,
p.y+32,
10,
5
);


}








function drawBall(){

ctx.fillStyle="white";

ctx.beginPath();

ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);

ctx.fill();

}








function distance(a,b){

return Math.hypot(a.x-b.x,a.y-b.y);

}








function moveRed(){


if(keys["w"]) red.y-=red.speed;

if(keys["s"]) red.y+=red.speed;

if(keys["a"]) red.x-=red.speed;

if(keys["d"]) red.x+=red.speed;



// SPACE TO SHOOT

if(keys[" "] && red.hasBall){

ball.x+=20;

red.hasBall=false;

yellow.hasBall=false;

}


}








function yellowAI(){


let dx=red.x-yellow.x;
let dy=red.y-yellow.y;


let d=Math.sqrt(dx*dx+dy*dy);



if(!yellow.hasBall){

yellow.x+=dx/d*yellow.speed;

yellow.y+=dy/d*yellow.speed;

}




if(distance(yellow,ball)<40){

yellow.hasBall=true;

red.hasBall=false;

}






if(yellow.hasBall){


yellow.x-=yellow.speed;


ball.x=yellow.x;

ball.y=yellow.y;


}



}








function ballControl(){



if(red.hasBall){

ball.x=red.x+20;

ball.y=red.y;

}




if(yellow.hasBall){

ball.x=yellow.x-20;

ball.y=yellow.y;

}






if(distance(red,ball)<40){

red.hasBall=true;

yellow.hasBall=false;

}





if(distance(yellow,ball)<40){

yellow.hasBall=true;

red.hasBall=false;

}




}










function checkGoal(){


if(ball.x<30){

yellowScore++;

reset();

}




if(ball.x>870){

redScore++;

reset();

}




document.getElementById("score").innerHTML=
"Red "+redScore+" - "+yellowScore+" Yellow";


}








function reset(){


red.x=200;

red.y=250;


yellow.x=700;

yellow.y=250;


ball.x=450;

ball.y=250;


red.hasBall=true;

yellow.hasBall=false;


}







function restart(){

redScore=0;

yellowScore=0;

reset();


}









function gameLoop(){


drawField();


moveRed();


yellowAI();


ballControl();



drawPlayer(red);

drawPlayer(yellow);


drawBall();


checkGoal();



requestAnimationFrame(gameLoop);



}



gameLoop();



</script>


</body>
</html>
